# Railway / Nixpacks 构建配置
# 解决：前端构建 + 系统依赖 + 目录创建

[phases.setup]
nixPkgs = ["python312", "nodejs_22", "pango", "cairo", "pkg-config", "gdk-pixbuf", "libffi"]

[phases.install]
cmds = [
  "cd frontend && npm ci",
  "uv sync --locked --no-dev --no-install-project",
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
]

[start]
cmd = "mkdir -p data/raw data/parsed data/evidence data/charts data/reports data/runs db cache && uvicorn src.api.server:app --host 0.0.0.0 --port $PORT --log-level debug"
